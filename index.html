<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Thành Viên</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="title">Cộng Đồng</h1>

        <div id="login-section">
            <p>Vui lòng đăng nhập bằng Google</p>
            <button id="btn-google" class="btn google">Tiếp tục với Google</button>
            <button id="btn-facebook" class="btn facebook">Tiếp tục với Facebook</button>
        </div>

        <div id="user-info" class="hidden">
            <img id="user-photo" src="" alt="Avatar">
            <h2 id="user-name">---</h2>
            <p id="user-email">---</p>
            <p>Ngày tham gia: <span id="join-date">---</span></p>
            
            <hr>
            <h4 style="margin-bottom: 10px;">Lịch sử truy cập</h4>
            <ul id="login-history-list"></ul>
            <hr>

            <button id="btn-logout" class="btn logout">Đăng xuất</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
